<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TSun • Next-Gen Thumbnail Downloader</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            display: ['"Plus Jakarta Sans"', 'sans-serif'],
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            brand: {
              400: '#a78bfa',
              500: '#8b5cf6',
              600: '#7c3aed',
            },
            surface: {
              50: '#f9fafb',
              100: '#f3f4f6',
              800: '#1f2937',
              900: '#111827',
              950: '#030712',
            }
          },
          animation: {
            'gradient-x': 'gradient-x 15s ease infinite',
            'float': 'float 6s ease-in-out infinite',
            'slide-up': 'slide-up 0.5s ease-out forwards',
          },
          keyframes: {
            'gradient-x': {
              '0%, 100%': {
                'background-size': '200% 200%',
                'background-position': 'left center'
              },
              '50%': {
                'background-size': '200% 200%',
                'background-position': 'right center'
              },
            },
            'float': {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-10px)' },
            },
            'slide-up': {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="style.css" />
  
  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body class="bg-surface-50 dark:bg-surface-950 text-surface-900 dark:text-surface-50 antialiased min-h-screen flex flex-column selection:bg-brand-500 selection:text-white transition-colors duration-300">
  
  <!-- Animated Background Orbs -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
    <div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] rounded-full bg-brand-500/20 blur-[120px] mix-blend-screen animate-float" style="animation-duration: 12s;"></div>
    <div class="absolute top-[40%] -right-[10%] w-[40%] h-[40%] rounded-full bg-blue-500/20 blur-[120px] mix-blend-screen animate-float" style="animation-duration: 15s; animation-delay: 2s;"></div>
    <div class="absolute -bottom-[20%] left-[20%] w-[60%] h-[60%] rounded-full bg-purple-500/10 blur-[120px] mix-blend-screen animate-float" style="animation-duration: 18s; animation-delay: 1s;"></div>
  </div>

  <div class="relative z-10 flex flex-col min-h-screen">
    
    <!-- Navbar -->
    <header class="w-full px-6 py-5 flex items-center justify-between backdrop-blur-md border-b border-surface-200/50 dark:border-surface-800/50 supports-[backdrop-filter]:bg-surface-50/60 dark:supports-[backdrop-filter]:bg-surface-950/60 sticky top-0 z-50 transition-all">
      <div class="flex items-center gap-3 group cursor-pointer">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-brand-400 to-brand-600 flex items-center justify-center shadow-lg group-hover:shadow-brand-500/20 transition-all duration-300 transform group-hover:scale-105">
          <i class="ph-bold ph-lightning text-white text-xl"></i>
        </div>
        <span class="font-display font-bold text-xl tracking-tight">TSun<span class="text-brand-500">.</span></span>
      </div>
      
      <button id="themeToggle" class="w-10 h-10 rounded-full flex items-center justify-center bg-surface-100 dark:bg-surface-800 hover:bg-surface-200 dark:hover:bg-surface-700 transition-all duration-300 hover:scale-105 border border-surface-200 dark:border-surface-700">
        <i class="ph-bold ph-sun text-xl hidden dark:block text-amber-400"></i>
        <i class="ph-bold ph-moon text-xl block dark:hidden text-indigo-500"></i>
      </button>
    </header>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-4 py-12 md:py-24 flex flex-col items-center justify-center max-w-5xl">
      
      <!-- Hero Section -->
      <section class="w-full text-center mb-16 animate-slide-up">
        <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-brand-500/10 border border-brand-500/20 text-brand-600 dark:text-brand-400 text-sm font-semibold mb-6">
          <i class="ph-fill ph-sparkle"></i>
          <span>Redesigned from 0 to 100</span>
        </div>
        
        <h1 class="font-display text-4xl md:text-6xl lg:text-7xl font-extrabold tracking-tight leading-tight mb-6">
          Extract thumbnails in <br class="hidden md:block"/>
          <span class="text-transparent bg-clip-text bg-gradient-to-r from-brand-400 via-purple-500 to-blue-500 animate-gradient-x">absolute highest quality.</span>
        </h1>
        
        <p class="text-surface-600 dark:text-surface-400 text-lg md:text-xl max-w-2xl mx-auto mb-10">
          Paste any YouTube URL and instantly fetch all available thumbnail resolutions. Clean, fast, and completely free.
        </p>

        <!-- Input Area -->
        <form id="ifrm" novalidate class="w-full max-w-3xl mx-auto relative group">
          <div class="absolute -inset-1 rounded-2xl bg-gradient-to-r from-brand-400 via-purple-500 to-blue-500 opacity-20 group-hover:opacity-40 blur transition duration-500"></div>
          <div class="relative flex flex-col md:flex-row items-center p-2 bg-white dark:bg-surface-900 border border-surface-200 dark:border-surface-800 rounded-2xl shadow-xl transition-all">
            <div class="flex-grow flex items-center px-4 w-full">
              <i class="ph-bold ph-link text-surface-400 text-xl mr-3"></i>
              <input 
                type="url" 
                id="urlTxt" 
                class="w-full bg-transparent border-none outline-none py-4 text-surface-900 dark:text-white placeholder-surface-400 text-lg" 
                placeholder="https://youtube.com/watch?v=..." 
                required 
                autocomplete="off"
              />
            </div>
            <button type="submit" id="btn-grab" class="w-full md:w-auto mt-2 md:mt-0 bg-brand-500 hover:bg-brand-600 text-white font-semibold py-4 px-8 rounded-xl transition-all duration-300 hover:shadow-lg hover:shadow-brand-500/25 flex items-center justify-center gap-2 disabled:opacity-70 disabled:cursor-not-allowed">
              <span>Extract</span>
              <i class="ph-bold ph-arrow-right"></i>
            </button>
          </div>
        </form>

        <p id="status" class="mt-4 text-sm font-medium h-5 transition-all opacity-0"></p>
      </section>

      <!-- Results Area -->
      <section id="results" class="w-full hidden opacity-0 transition-opacity duration-700">
        
        <!-- Video Preview -->
        <div class="mb-16">
          <div class="flex items-center justify-between mb-6">
            <h2 class="font-display text-2xl font-bold flex items-center gap-3">
              <i class="ph-duotone ph-monitor-play text-brand-500"></i>
              Video Preview
            </h2>
            <button id="copyBtn" class="text-sm font-medium px-4 py-2 rounded-lg bg-surface-100 dark:bg-surface-800 hover:bg-surface-200 dark:hover:bg-surface-700 transition flex items-center gap-2">
              <i class="ph-bold ph-copy"></i>
              Copy ID
            </button>
          </div>
          
          <div class="relative w-full rounded-2xl overflow-hidden shadow-2xl border border-surface-200 dark:border-surface-800 bg-surface-100 dark:bg-surface-900 aspect-video group">
            <div class="absolute inset-0 flex items-center justify-center pointer-events-none" id="videoLoader">
              <i class="ph-bold ph-spinner animate-spin text-3xl text-brand-500"></i>
            </div>
            <iframe id="youtube" class="w-full h-full relative z-10 opacity-0 transition-opacity duration-500" src="" allowfullscreen></iframe>
          </div>
        </div>

        <!-- Thumbnails Grid -->
        <div>
          <h2 class="font-display text-2xl font-bold flex items-center gap-3 mb-6">
            <i class="ph-duotone ph-image text-brand-500"></i>
            Available Resolutions
          </h2>
          
          <ul class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="thumbnailGrid">
            <!-- Injected by JS -->
          </ul>
        </div>
      </section>

    </main>

    <!-- Footer -->
    <footer class="w-full border-t border-surface-200 dark:border-surface-800 py-8 mt-auto backdrop-blur-sm">
      <div class="container mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-4">
        <p class="text-surface-500 dark:text-surface-400 font-medium text-sm">
          &copy; 2022 TSun Studio. Reimagined Interface. | Version 7.0.22
        </p>
        <div class="flex items-center gap-6">
          <a href="https://github.com/SaeedX302" target="_blank" class="text-surface-400 hover:text-surface-900 dark:hover:text-white transition transform hover:scale-110">
            <i class="ph-fill ph-github-logo text-2xl"></i>
          </a>
          <a href="https://www.tiktok.com/@saeedxdie" target="_blank" class="text-surface-400 hover:text-surface-900 dark:hover:text-white transition transform hover:scale-110">
            <i class="ph-fill ph-tiktok-logo text-2xl"></i>
          </a>
        </div>
      </div>
    </footer>
  </div>

  <!-- Toast Container -->
  <div id="toastContainer" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3"></div>

  <script src="main.js"></script>
</body>
</html>
