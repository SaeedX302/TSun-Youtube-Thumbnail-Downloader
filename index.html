<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TSun Thumbnail Downloader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" charset="utf-8" />
    <script>
      const savedTheme = localStorage.getItem("theme");
      if (savedTheme) {
        document.documentElement.setAttribute("data-theme", savedTheme);
      } else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) {
        document.documentElement.setAttribute("data-theme", "light");
      }
    </script>
  </head>
  <body>
    <header class="site-header">
      <button id="themeToggle" type="button" class="theme-toggle" aria-label="Toggle dark mode">
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
      </button>
    </header>
    <main class="app-shell">
      <section class="hero card">
        <p class="badge">2017 classic</p>
        <h1>TSun Thumbnail Downloader</h1>
        <p class="subtitle">Paste a YouTube link and instantly download every available thumbnail size.</p>

        <form id="ifrm" class="grab-form" novalidate>
          <label class="sr-only" for="urlTxt">YouTube URL</label>
          <input
            type="url"
            id="urlTxt"
            placeholder="https://www.youtube.com/watch?v=..."
            autocomplete="off"
            required
          />
          <button type="submit" id="btn-grab">Get Thumbnails</button>
        </form>

        <p id="status" class="status" role="status" aria-live="polite"></p>
      </section>

      <section class="preview card">
        <h2>Video Preview</h2>
        <div class="video-frame">
          <iframe
            id="youtube"
            title="YouTube preview"
            src=""
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen
          ></iframe>
        </div>
      </section>

      <section id="select" class="downloads card" hidden>
        <div class="downloads-head">
          <h2>Download Thumbnails</h2>
          <button id="copyBtn" type="button" class="ghost-btn">Copy Video ID</button>
        </div>
        <ul class="thumbnail-grid"></ul>
      </section>
    </main>

    <footer>
      <span>&copy; TSun-ytgrab, 2017</span>
    </footer>
    <script src="main.js" charset="utf-8"></script>
  </body>
</html>
