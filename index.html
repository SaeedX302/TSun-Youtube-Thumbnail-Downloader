<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TSun Thumbnail Downloader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css" charset="utf-8" />
    <script>
      const savedTheme = localStorage.getItem("theme");
      if (savedTheme) {
        document.documentElement.setAttribute("data-theme", savedTheme);
        document.documentElement.setAttribute("data-bs-theme", savedTheme);
      } else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) {
        document.documentElement.setAttribute("data-theme", "light");
        document.documentElement.setAttribute("data-bs-theme", "light");
      } else {
        document.documentElement.setAttribute("data-bs-theme", "dark");
      }
    </script>
  </head>
  <body class="d-flex flex-column min-vh-100">
    <header class="site-header p-3 d-flex justify-content-between align-items-center">
      <div class="brand-chip d-inline-flex align-items-center gap-2">
        <img src="https://img.icons8.com/3d-fluency/48/youtube-play.png" alt="TSun" width="24" height="24" />
        <span class="fw-semibold">TSun Studio</span>
      </div>
      <button id="themeToggle" type="button" class="theme-toggle btn btn-outline-secondary d-flex align-items-center justify-content-center border-0" aria-label="Toggle dark mode">
        <img class="icon-moon" src="https://img.icons8.com/3d-fluency/48/crescent-moon.png" alt="Moon" width="32" height="32" />
        <img class="icon-sun" src="https://img.icons8.com/3d-fluency/48/sun.png" alt="Sun" width="32" height="32" />
      </button>
    </header>
    <main class="container py-4 py-md-5 flex-grow-1">
      <div class="app-shell mx-auto">
        <div class="row justify-content-center g-4">
          <div class="col-12 col-lg-11 col-xl-10">
          
          <section class="hero card mb-4 shadow-sm">
            <div class="card-body">
              <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-3">
                <img src="https://img.icons8.com/3d-fluency/94/youtube-play.png" alt="YouTube Icon" width="48" height="48" class="me-3">
                <div>
                  <p class="badge bg-danger rounded-pill mb-1">2020 Premium</p>
                  <h1 class="h2 fw-bold mb-0">TSun Thumbnail Downloader</h1>
                </div>
                <span class="pill-note">Fast • Clean • HD</span>
              </div>
              <p class="subtitle text-muted mb-4 mt-2">Paste a YouTube link and instantly download every available thumbnail size.</p>

              <form id="ifrm" novalidate>
                <label class="visually-hidden" for="urlTxt">YouTube URL</label>
                <div class="input-group input-group-lg mb-3">
                  <input
                    type="url"
                    id="urlTxt"
                    class="form-control"
                    placeholder="https://www.youtube.com/watch?v=..."
                    autocomplete="off"
                    required
                  />
                  <button type="submit" id="btn-grab" class="btn btn-primary fw-bold px-4 d-flex align-items-center justify-content-center">
                    <img src="https://img.icons8.com/3d-fluency/48/search.png" alt="Search Icon" width="24" height="24" class="me-2">
                    Get Thumbnails
                  </button>
                </div>
              </form>

              <p id="status" class="status mt-2 mb-0" role="status" aria-live="polite"></p>
            </div>
          </section>

          <section class="preview card mb-4 shadow-sm">
            <div class="card-body">
              <h2 class="h4 mb-3 d-flex align-items-center">
                <img src="https://img.icons8.com/3d-fluency/48/tv-show.png" alt="Preview" width="28" height="28" class="me-2">
                Video Preview
              </h2>
              <div class="video-frame ratio ratio-16x9 rounded overflow-hidden">
                <iframe
                  id="youtube"
                  title="YouTube preview"
                  src=""
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                  allowfullscreen
                ></iframe>
              </div>
            </div>
          </section>

          <section id="select" class="downloads card shadow-sm" hidden>
            <div class="card-body">
              <div class="downloads-head d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
                <h2 class="h4 mb-0 d-flex align-items-center">
                  <img src="https://img.icons8.com/stickers/100/download-2.png" alt="Download" width="28" height="28" class="me-2">
                  Download Thumbnails
                </h2>
                <button id="copyBtn" type="button" class="btn btn-outline-primary btn-sm rounded-pill fw-medium px-3 d-flex align-items-center">
                  <img src="https://img.icons8.com/deco/48/copy.png" alt="Copy" width="16" height="16" class="me-2">
                  Copy Video ID
                </button>
              </div>
              <ul class="thumbnail-grid row g-3 list-unstyled"></ul>
            </div>
          </section>

          </div>
        </div>
      </div>
    </main>

    <footer class="site-footer text-center py-4 mt-auto border-top border-secondary-subtle">
      <div class="container">
        <h5 class="fw-bold mb-3 text-secondary">📌 Connect with TSun:</h5>
        <div class="d-flex justify-content-center gap-4 mb-3">
          <a href="https://github.com/SaeedX302" target="_blank" rel="noopener noreferrer" class="text-decoration-none text-muted fw-medium d-flex align-items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-github" viewBox="0 0 16 16">
              <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
            </svg>
            GitHub
          </a>
          <a href="https://www.tiktok.com/@saeedxdie" target="_blank" rel="noopener noreferrer" class="text-decoration-none text-muted fw-medium d-flex align-items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-tiktok" viewBox="0 0 16 16">
              <path d="M9 0h1.98c.144.715.54 1.617 1.235 2.512C12.895 3.389 13.797 4 15 4v2c-1.753 0-3.07-.814-4-1.829V11a5 5 0 1 1-5-5v2a3 3 0 1 0 3 3V0Z"/>

            TikTok

        </div>
        <p class="text-muted small mb-0">&copy; TSun, 2020 | Version 5.01.25</p>
      </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    <script src="main.js" charset="utf-8"></script>
  </body>
</html>
