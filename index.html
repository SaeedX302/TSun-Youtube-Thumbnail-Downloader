<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TSun Thumbnail Downloader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css" charset="utf-8" />
    <script>
      const savedTheme = localStorage.getItem("theme");
      if (savedTheme) {
        document.documentElement.setAttribute("data-theme", savedTheme);
        document.documentElement.setAttribute("data-bs-theme", savedTheme);
      } else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) {
        document.documentElement.setAttribute("data-theme", "light");
        document.documentElement.setAttribute("data-bs-theme", "light");
      } else {
        document.documentElement.setAttribute("data-bs-theme", "dark");
      }
    </script>
  </head>
  <body class="d-flex flex-column min-vh-100">
    <header class="site-header p-3 d-flex justify-content-end">
      <button id="themeToggle" type="button" class="theme-toggle btn btn-outline-secondary d-flex align-items-center justify-content-center" aria-label="Toggle dark mode">
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
      </button>
    </header>
    <main class="container my-4 flex-grow-1">
      <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-8 col-xl-7">
          
          <section class="hero card mb-4 shadow-sm">
            <div class="card-body">
              <p class="badge bg-danger rounded-pill mb-2">2019 Premium</p>
              <h1 class="h2 fw-bold">TSun Thumbnail Downloader</h1>
              <p class="subtitle text-muted mb-4">Paste a YouTube link and instantly download every available thumbnail size.</p>

              <form id="ifrm" novalidate>
                <label class="visually-hidden" for="urlTxt">YouTube URL</label>
                <div class="input-group input-group-lg mb-3">
                  <input
                    type="url"
                    id="urlTxt"
                    class="form-control"
                    placeholder="https://www.youtube.com/watch?v=..."
                    autocomplete="off"
                    required
                  />
                  <button type="submit" id="btn-grab" class="btn btn-primary fw-bold px-4">Get Thumbnails</button>
                </div>
              </form>

              <p id="status" class="status mt-2 mb-0" role="status" aria-live="polite"></p>
            </div>
          </section>

          <section class="preview card mb-4 shadow-sm">
            <div class="card-body">
              <h2 class="h4 mb-3">Video Preview</h2>
              <div class="video-frame ratio ratio-16x9 rounded overflow-hidden">
                <iframe
                  id="youtube"
                  title="YouTube preview"
                  src=""
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                  allowfullscreen
                ></iframe>
              </div>
            </div>
          </section>

          <section id="select" class="downloads card shadow-sm" hidden>
            <div class="card-body">
              <div class="downloads-head d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
                <h2 class="h4 mb-0">Download Thumbnails</h2>
                <button id="copyBtn" type="button" class="btn btn-outline-primary btn-sm rounded-pill fw-medium px-3">Copy Video ID</button>
              </div>
              <ul class="thumbnail-grid row g-3 list-unstyled"></ul>
            </div>
          </section>

        </div>
      </div>
    </main>

    <footer class="text-center py-4 mt-auto border-top border-secondary-subtle">
      <div class="container">
        <h5 class="fw-bold mb-3 text-secondary">📌 Connect with TSun:</h5>
        <div class="d-flex justify-content-center gap-4 mb-3">
          <a href="https://github.com/SaeedX302" target="_blank" rel="noopener noreferrer" class="text-decoration-none text-muted fw-medium d-flex align-items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-github" viewBox="0 0 16 16">
              <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
            </svg>
            GitHub
          </a>
          <a href="https://www.tiktok.com/@saeedxdie" target="_blank" rel="noopener noreferrer" class="text-decoration-none text-muted fw-medium d-flex align-items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-tiktok" viewBox="0 0 16 16">
              <path d="M9 0h1.98c.144.715.54 1.617 1.235 2.512C12.895 3.389 13.797 4 15 4v2c-1.753 0-3.07-.814-4-1.829V11a5 5 0 1 1-5-5v2a3 3 0 1 0 3 3V0Z"/>
            </svg>
            TikTok
          </a>
        </div>
        <p class="text-muted small mb-0">&copy; TSun, 2019</p>
      </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    <script src="main.js" charset="utf-8"></script>
  </body>
</html>
